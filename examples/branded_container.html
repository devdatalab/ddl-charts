<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDL Charts — Branded Container</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- DDL theme: styles the branded frame, footer, and inline logo mark. -->
  <link rel="stylesheet" href="../src/styles/ddl-theme.css" />

  <!--
    The library source uses bare `import * as d3 from 'd3'`. This import map
    resolves that to a CDN ESM build so the example runs without a bundler.
  -->
  <script type="importmap">
    { "imports": { "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm" } }
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #333;
    }
    #chart {
      max-width: 980px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="chart"></div>

  <script type="module">
    import * as d3 from 'd3';
    import { createChartContainer, createLineChart } from '../src/index.js';

    const data = await fetch('./data/line_chart_sample.json').then((r) => r.json());

    // Branded frame: title/subtitle, source line, and the DDL logo in the footer.
    const { body } = createChartContainer(d3.select('#chart'), {
      title: 'Urban population share, 1975–2020',
      subtitle: 'Share of population living in urban areas, selected countries',
      source: 'UN World Urbanization Prospects',
      sourceUrl: 'https://population.un.org/wup/',
    });

    createLineChart(d3.select(body), data, {
      height: 460,
      initialHighlights: ['USA', 'CHN', 'IND'],
      showLegend: false,
      showLabels: true,
      showGrid: true,
      curve: 'linear',
      yTickFormat: (d) => `${d}%`,
    });

    // Signal for the screenshot script that the chart has rendered.
    window.__chartReady = true;
  </script>
</body>
</html>
