<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDL Charts — Beeswarm Chart</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- See line_chart.html for why this import map exists. -->
  <script type="importmap">
    { "imports": { "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm" } }
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #333;
    }
    .page-header { max-width: 860px; margin: 0 auto 16px; }
    .page-header h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; color: #2c3e50; }
    .page-header p { font-size: 13px; color: #666; margin: 0; }
    #chart {
      max-width: 860px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 20px;
      position: relative;
    }
    .swatches {
      max-width: 860px;
      margin: 10px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: #555;
    }
    .swatches .swatch { display: inline-flex; align-items: center; gap: 6px; }
    .swatches .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Mean night-time light intensity by region</h1>
    <p>Single-track beeswarm (<code>createBeeswarmChart</code>). Highlighted entities are coloured; hover any dot to inspect it.</p>
  </div>

  <div id="chart"></div>
  <div class="swatches" id="swatches"></div>

  <script type="module">
    import * as d3 from 'd3';
    import { createBeeswarmChart, HIGHLIGHT_COLORS } from '../src/index.js';

    const data = await fetch('./data/beeswarm_sample.json').then((r) => r.json());
    const highlights = ['USA', 'CHN', 'IND', 'BRA', 'NGA'];

    createBeeswarmChart(d3.select('#chart'), data, {
      height: 290,
      dotRadius: 3.5,
      rowSpacing: 8,
      highlights,
      showMedian: true,
      palette: HIGHLIGHT_COLORS,
    });

    // Simple legend of highlighted entities (palette assigned in highlight order).
    const byId = new Map(data.items.map((d) => [d.id, d]));
    const sw = d3.select('#swatches');
    highlights.forEach((id, i) => {
      const item = byId.get(id);
      if (!item) return;
      const el = sw.append('span').attr('class', 'swatch');
      el.append('span').attr('class', 'dot').style('background', HIGHLIGHT_COLORS[i % HIGHLIGHT_COLORS.length]);
      el.append('span').text(`${item.name} (${item.value})`);
    });

    window.__chartReady = true;
  </script>
</body>
</html>
