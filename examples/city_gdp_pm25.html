<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City GDP per Capita vs PM2.5 Trajectories</title>

  <!-- Google Fonts - Lato (OWID-style) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #fafafa;
      color: #333;
    }

    .page-header {
      max-width: 1200px;
      margin: 0 auto 20px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      color: #2c3e50;
    }

    .page-header p {
      font-size: 14px;
      color: #666;
      margin: 0;
    }

    #chart-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 20px;
      position: relative;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 500px;
      color: #666;
    }

    .footer {
      max-width: 1200px;
      margin: 20px auto 0;
      padding-top: 16px;
      border-top: 1px solid #e5e5e5;
      font-size: 12px;
      color: #999;
    }

    .footer a {
      color: #1E88E5;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>City GDP per Capita vs PM2.5 Trajectories</h1>
    <p>Showing trajectories of cities with population > 1 million from 2013–2023. Click legend to highlight countries, hover trajectories for details.</p>
  </div>

  <div id="chart-container">
    <div class="loading">Loading visualization...</div>
  </div>

  <div class="footer">
    Data: <a href="https://devdatalab.org" target="_blank">Dev Data Lab</a> |
    Visualization: DDL Charts (D3.js)
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <script type="module">
    // === COLORS ===
    const HIGHLIGHT_COLORS = [
      '#E53935', // Red
      '#1E88E5', // Blue
      '#43A047', // Green
      '#FB8C00', // Orange
      '#8E24AA', // Purple
      '#00ACC1', // Teal
      '#D81B60', // Pink
      '#FFD700', // Gold
    ];

    const DEFAULT_COUNTRY_COLORS = {
      CHN: '#E53935',
      IND: '#FFD700',
      USA: '#1E88E5',
    };

    const UI_COLORS = {
      text: '#5b5b5b',
      textLight: '#999999',
      muted: 'rgba(150, 150, 150, 0.2)',
      mutedMarker: 'rgba(150, 150, 150, 0.4)',
    };

    // Track which countries are actively highlighted
    let activeHighlights = new Set(['CHN', 'IND', 'USA']);
    let colorAssignments = new Map();
    let nextColorIndex = 3;

    function getCountryColor(iso3) {
      if (activeHighlights.has(iso3)) {
        if (!colorAssignments.has(iso3)) {
          if (DEFAULT_COUNTRY_COLORS[iso3]) {
            colorAssignments.set(iso3, DEFAULT_COUNTRY_COLORS[iso3]);
          } else {
            colorAssignments.set(iso3, HIGHLIGHT_COLORS[nextColorIndex % HIGHLIGHT_COLORS.length]);
            nextColorIndex++;
          }
        }
        return colorAssignments.get(iso3);
      }
      return UI_COLORS.muted;
    }

    function isHighlighted(iso3) {
      return activeHighlights.has(iso3);
    }

    // === UTILITIES ===
    function smoothValues(values, windowSize = 3) {
      if (values.length <= 2) return [...values];
      const result = [];
      const halfWindow = Math.floor(windowSize / 2);
      for (let i = 0; i < values.length; i++) {
        if (i === 0 || i === values.length - 1) {
          result.push(values[i]);
          continue;
        }
        let sum = 0, count = 0;
        for (let j = Math.max(0, i - halfWindow); j <= Math.min(values.length - 1, i + halfWindow); j++) {
          sum += values[j];
          count++;
        }
        result.push(sum / count);
      }
      return result;
    }

    // === LOAD DATA ===
    async function loadData() {
      const response = await fetch('./data/city_trajectories.json');
      return response.json();
    }

    // === MAIN CHART ===
    async function createChart() {
      const container = d3.select('#chart-container');
      container.select('.loading').remove();

      const data = await loadData();

      // Dimensions - increased left margin for Y-axis label
      const containerWidth = container.node().getBoundingClientRect().width;
      const width = Math.min(containerWidth - 40, 1100);
      const height = 650;
      const margin = { top: 30, right: 220, bottom: 70, left: 90 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      // Create SVG
      const svg = container
        .append('svg')
        .attr('width', width)
        .attr('height', height)
        .style('display', 'block')
        .style('margin', '0 auto');

      const chartArea = svg
        .append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      // Scales
      const xScale = d3.scaleLog()
        .domain([data.bounds.gdp.min * 0.9, data.bounds.gdp.max * 1.1])
        .range([0, innerWidth]);

      const yScale = d3.scaleLog()
        .domain([data.bounds.pm25.min * 0.9, data.bounds.pm25.max * 1.1])
        .range([innerHeight, 0]);

      // Clean tick values
      const xTickValues = [1000, 2000, 5000, 10000, 20000, 50000, 100000, 200000];
      const yTickValues = [5, 10, 20, 50, 100, 200];

      // NO GRID LINES - removed per user request

      // Axes - clean styling without extra domain lines
      chartArea.append('g')
        .attr('class', 'x-axis')
        .attr('transform', `translate(0,${innerHeight})`)
        .call(d3.axisBottom(xScale)
          .tickValues(xTickValues)
          .tickFormat(d => d >= 1000 ? `$${d/1000}K` : `$${d}`)
          .tickSize(5)
        )
        .call(g => g.select('.domain').attr('stroke', '#ccc'))
        .call(g => g.selectAll('.tick line').attr('stroke', '#ccc'))
        .selectAll('text')
        .style('font-size', '11px')
        .style('fill', UI_COLORS.text);

      chartArea.append('g')
        .attr('class', 'y-axis')
        .call(d3.axisLeft(yScale)
          .tickValues(yTickValues)
          .tickFormat(d => d)
          .tickSize(5)
        )
        .call(g => g.select('.domain').attr('stroke', '#ccc'))
        .call(g => g.selectAll('.tick line').attr('stroke', '#ccc'))
        .selectAll('text')
        .style('font-size', '11px')
        .style('fill', UI_COLORS.text);

      // Axis labels - positioned to avoid collision
      svg.append('text')
        .attr('x', margin.left + innerWidth / 2)
        .attr('y', height - 12)
        .attr('text-anchor', 'middle')
        .style('font-size', '13px')
        .style('fill', UI_COLORS.text)
        .text(data.metadata.xAxis);

      svg.append('text')
        .attr('transform', 'rotate(-90)')
        .attr('x', -(margin.top + innerHeight / 2))
        .attr('y', 15)
        .attr('text-anchor', 'middle')
        .style('font-size', '13px')
        .style('fill', UI_COLORS.text)
        .text(data.metadata.yAxis);

      // Line generator
      const line = d3.line()
        .x(d => xScale(d.gdp))
        .y(d => yScale(d.pm25))
        .curve(d3.curveCardinal.tension(0.5));

      // Function to update trajectories - respects active state
      function updateAllTrajectories() {
        chartArea.selectAll('.city-group').each(function() {
          const g = d3.select(this);
          const city = g.datum();
          const highlighted = isHighlighted(city.iso3);
          const color = getCountryColor(city.iso3);

          g.select('.trajectory-line')
            .style('stroke', color)
            .style('stroke-width', highlighted ? 2.5 : 1)
            .style('stroke-opacity', highlighted ? 0.9 : 0.25);

          g.select('.marker-start')
            .style('fill', color)
            .attr('r', highlighted ? 4 : 2)
            .style('opacity', highlighted ? 1 : 0.35);

          g.select('.marker-end')
            .style('stroke', color)
            .style('fill', highlighted ? 'white' : color)
            .style('opacity', highlighted ? 1 : 0.35);

          g.selectAll('.year-label')
            .style('opacity', highlighted ? 1 : 0)
            .style('fill', color);
        });
      }

      // Render all cities
      function renderCity(city) {
        const highlighted = isHighlighted(city.iso3);
        const color = getCountryColor(city.iso3);

        const gdpValues = city.trajectory.map(p => p.gdp);
        const pm25Values = city.trajectory.map(p => p.pm25);
        const smoothedGdp = smoothValues(gdpValues);
        const smoothedPm25 = smoothValues(pm25Values);
        const smoothedTrajectory = city.trajectory.map((p, i) => ({
          ...p,
          gdp: smoothedGdp[i],
          pm25: smoothedPm25[i],
        }));

        const cityGroup = chartArea.append('g')
          .attr('class', 'city-group')
          .attr('data-city-id', city.id)
          .attr('data-iso3', city.iso3)
          .datum(city);

        cityGroup.append('path')
          .attr('class', 'trajectory-line')
          .attr('d', line(smoothedTrajectory))
          .style('fill', 'none')
          .style('stroke', color)
          .style('stroke-width', highlighted ? 2.5 : 1)
          .style('stroke-opacity', highlighted ? 0.9 : 0.25)
          .style('transition', 'stroke-width 0.15s ease, stroke-opacity 0.15s ease, stroke 0.15s ease');

        const start = city.trajectory[0];
        cityGroup.append('circle')
          .attr('class', 'marker-start')
          .attr('cx', xScale(start.gdp))
          .attr('cy', yScale(start.pm25))
          .attr('r', highlighted ? 4 : 2)
          .style('fill', color)
          .style('opacity', highlighted ? 1 : 0.35)
          .style('transition', 'all 0.15s ease');

        const end = city.trajectory[city.trajectory.length - 1];
        const size = highlighted ? 5 : 3;
        const triangle = d3.symbol().type(d3.symbolTriangle).size(size * size * 2);

        cityGroup.append('path')
          .attr('class', 'marker-end')
          .attr('d', triangle)
          .attr('transform', `translate(${xScale(end.gdp)},${yScale(end.pm25)})`)
          .style('fill', highlighted ? 'white' : color)
          .style('stroke', color)
          .style('stroke-width', highlighted ? 1.5 : 1)
          .style('opacity', highlighted ? 1 : 0.35)
          .style('transition', 'all 0.15s ease');

        cityGroup.append('text')
          .attr('class', 'year-label year-start')
          .attr('x', xScale(start.gdp))
          .attr('y', yScale(start.pm25) - 8)
          .attr('text-anchor', 'middle')
          .style('font-size', '10px')
          .style('fill', color)
          .style('font-weight', '600')
          .style('opacity', highlighted ? 1 : 0)
          .style('pointer-events', 'none')
          .text(city.yearStart);

        cityGroup.append('text')
          .attr('class', 'year-label year-end')
          .attr('x', xScale(end.gdp))
          .attr('y', yScale(end.pm25) - 8)
          .attr('text-anchor', 'middle')
          .style('font-size', '10px')
          .style('fill', color)
          .style('font-weight', '600')
          .style('opacity', highlighted ? 1 : 0)
          .style('pointer-events', 'none')
          .text(city.yearEnd);

        return cityGroup;
      }

      // Sort and render
      const sortedCities = [...data.cities].sort((a, b) => {
        const aH = isHighlighted(a.iso3) ? 1 : 0;
        const bH = isHighlighted(b.iso3) ? 1 : 0;
        return aH - bH;
      });

      sortedCities.forEach(city => renderCity(city));

      // Tooltip
      const tooltip = container.append('div')
        .style('position', 'absolute')
        .style('pointer-events', 'none')
        .style('background', 'rgba(255,255,255,0.97)')
        .style('border', '1px solid #ccc')
        .style('border-radius', '4px')
        .style('padding', '10px 12px')
        .style('box-shadow', '0 2px 8px rgba(0,0,0,0.15)')
        .style('font-size', '13px')
        .style('opacity', 0)
        .style('z-index', 1000)
        .style('transition', 'opacity 0.1s ease');

      function showTooltip(city, event) {
        const gdpChange = ((city.gdpEnd - city.gdpStart) / city.gdpStart * 100).toFixed(0);
        const pm25Change = ((city.pm25End - city.pm25Start) / city.pm25Start * 100).toFixed(0);
        const gdpArrow = gdpChange >= 0 ? '↑' : '↓';
        const pm25Arrow = pm25Change >= 0 ? '↑' : '↓';
        const gdpColor = gdpChange >= 0 ? '#43A047' : '#E53935';
        const pm25Color = pm25Change <= 0 ? '#43A047' : '#E53935';

        tooltip.html(`
          <div style="font-weight: 600; margin-bottom: 4px;">${city.name}</div>
          <div style="color: #999; margin-bottom: 8px; font-size: 12px;">${city.country}</div>
          <div style="font-size: 12px; line-height: 1.6;">
            <div><span style="color: #999;">Period:</span> ${city.yearStart} → ${city.yearEnd}</div>
            <div><span style="color: #999;">GDP/capita:</span> $${Math.round(city.gdpStart).toLocaleString()} → $${Math.round(city.gdpEnd).toLocaleString()} <span style="color: ${gdpColor};">${gdpArrow}${Math.abs(gdpChange)}%</span></div>
            <div><span style="color: #999;">PM2.5:</span> ${city.pm25Start.toFixed(1)} → ${city.pm25End.toFixed(1)} <span style="color: ${pm25Color};">${pm25Arrow}${Math.abs(pm25Change)}%</span></div>
          </div>
        `);

        const containerRect = container.node().getBoundingClientRect();
        const [x, y] = d3.pointer(event, container.node());
        let left = x + 15;
        let top = y - 10;
        const tooltipWidth = 220;
        if (left + tooltipWidth > containerRect.width - 20) {
          left = x - tooltipWidth - 15;
        }

        tooltip
          .style('left', left + 'px')
          .style('top', top + 'px')
          .style('opacity', 1);
      }

      function hideTooltip() {
        tooltip.style('opacity', 0);
      }

      // HOVER INTERACTIONS - RESPECTS ACTIVE STATE
      // Key change: Active/highlighted countries are NEVER dimmed
      chartArea.selectAll('.city-group')
        .style('cursor', 'pointer')
        .on('mouseenter', function(event) {
          const hoveredCity = d3.select(this).datum();
          const hoveredIso3 = hoveredCity.iso3;

          chartArea.selectAll('.city-group').each(function() {
            const g = d3.select(this);
            const city = g.datum();
            const isHoveredCity = city.id === hoveredCity.id;
            const cityIsActive = isHighlighted(city.iso3);

            if (isHoveredCity) {
              // Always highlight the hovered city
              g.select('.trajectory-line')
                .style('stroke-width', 4)
                .style('stroke-opacity', 1);
              g.raise();
            } else if (cityIsActive) {
              // NEVER dim active/highlighted countries - keep them visible
              // Just slightly reduce opacity to make hovered city stand out more
              g.select('.trajectory-line')
                .style('stroke-opacity', 0.5);
            } else {
              // Dim non-active, non-hovered cities
              g.select('.trajectory-line')
                .style('stroke-opacity', 0.05);
            }
          });

          showTooltip(hoveredCity, event);
        })
        .on('mousemove', function(event) {
          const city = d3.select(this).datum();
          showTooltip(city, event);
        })
        .on('mouseleave', function() {
          updateAllTrajectories();
          hideTooltip();
        });

      // Legend
      const legendContainer = container.append('div')
        .style('position', 'absolute')
        .style('top', (margin.top + 10) + 'px')
        .style('right', '20px')
        .style('max-height', (innerHeight - 20) + 'px')
        .style('overflow-y', 'auto')
        .style('background', 'white')
        .style('border-radius', '4px')
        .style('padding', '8px 0')
        .style('width', '180px');

      const countries = new Map();
      data.cities.forEach(city => {
        if (!countries.has(city.iso3)) {
          countries.set(city.iso3, {
            iso3: city.iso3,
            name: city.country,
          });
        }
      });

      const sortedCountries = Array.from(countries.values()).sort((a, b) => {
        const aH = isHighlighted(a.iso3) ? 0 : 1;
        const bH = isHighlighted(b.iso3) ? 0 : 1;
        if (aH !== bH) return aH - bH;
        return a.name.localeCompare(b.name);
      });

      function updateLegend() {
        legendContainer.selectAll('.legend-item').each(function() {
          const item = d3.select(this);
          const iso3 = item.attr('data-iso3');
          const highlighted = isHighlighted(iso3);
          const color = getCountryColor(iso3);

          item.select('.legend-marker')
            .style('background-color', color)
            .style('opacity', highlighted ? 1 : 0.4);

          item.select('.legend-label')
            .style('font-weight', highlighted ? '600' : '400')
            .style('color', highlighted ? UI_COLORS.text : UI_COLORS.textLight);
        });
      }

      sortedCountries.forEach(country => {
        const highlighted = isHighlighted(country.iso3);
        const color = getCountryColor(country.iso3);

        const item = legendContainer.append('div')
          .attr('class', 'legend-item')
          .attr('data-iso3', country.iso3)
          .style('display', 'flex')
          .style('align-items', 'center')
          .style('padding', '5px 12px')
          .style('cursor', 'pointer')
          .style('border-radius', '4px')
          .style('transition', 'background-color 0.15s ease');

        item.append('div')
          .attr('class', 'legend-marker')
          .style('width', '12px')
          .style('height', '12px')
          .style('border-radius', '2px')
          .style('margin-right', '8px')
          .style('background-color', color)
          .style('opacity', highlighted ? 1 : 0.4)
          .style('flex-shrink', 0)
          .style('transition', 'all 0.15s ease');

        item.append('span')
          .attr('class', 'legend-label')
          .style('font-size', '12px')
          .style('color', highlighted ? UI_COLORS.text : UI_COLORS.textLight)
          .style('font-weight', highlighted ? '600' : '400')
          .style('white-space', 'nowrap')
          .style('overflow', 'hidden')
          .style('text-overflow', 'ellipsis')
          .style('transition', 'all 0.15s ease')
          .text(country.name);

        // Click to toggle highlight
        item.on('click', function() {
          const iso3 = country.iso3;

          if (activeHighlights.has(iso3)) {
            activeHighlights.delete(iso3);
          } else {
            activeHighlights.add(iso3);
            if (!colorAssignments.has(iso3)) {
              if (DEFAULT_COUNTRY_COLORS[iso3]) {
                colorAssignments.set(iso3, DEFAULT_COUNTRY_COLORS[iso3]);
              } else {
                colorAssignments.set(iso3, HIGHLIGHT_COLORS[nextColorIndex % HIGHLIGHT_COLORS.length]);
                nextColorIndex++;
              }
            }
          }

          updateAllTrajectories();
          updateLegend();

          // Re-sort: bring highlighted to front
          chartArea.selectAll('.city-group')
            .sort((a, b) => {
              const aH = isHighlighted(a.iso3) ? 1 : 0;
              const bH = isHighlighted(b.iso3) ? 1 : 0;
              return aH - bH;
            });
        });

        // LEGEND HOVER - RESPECTS ACTIVE STATE
        item.on('mouseenter', function() {
          d3.select(this).style('background-color', 'rgba(0,0,0,0.05)');

          const hoveredIso3 = country.iso3;

          chartArea.selectAll('.city-group').each(function() {
            const g = d3.select(this);
            const city = g.datum();
            const isHoveredCountry = city.iso3 === hoveredIso3;
            const cityIsActive = isHighlighted(city.iso3);

            if (isHoveredCountry) {
              // Highlight hovered country's cities
              g.select('.trajectory-line')
                .style('stroke-width', 3)
                .style('stroke-opacity', 0.9);
              g.raise();
            } else if (cityIsActive) {
              // Keep active countries visible (don't dim them)
              g.select('.trajectory-line')
                .style('stroke-opacity', 0.5);
            } else {
              // Dim non-active, non-hovered cities
              g.select('.trajectory-line')
                .style('stroke-opacity', 0.05);
            }
          });
        });

        item.on('mouseleave', function() {
          d3.select(this).style('background-color', 'transparent');
          updateAllTrajectories();
        });
      });

      // Search
      const searchContainer = container.insert('div', 'svg')
        .style('margin-bottom', '12px')
        .style('display', 'flex')
        .style('align-items', 'center');

      searchContainer.append('svg')
        .attr('width', 16)
        .attr('height', 16)
        .attr('viewBox', '0 0 24 24')
        .style('margin-right', '8px')
        .html(`<path fill="#999" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>`);

      const searchInput = searchContainer.append('input')
        .attr('type', 'text')
        .attr('placeholder', 'Search cities or countries...')
        .style('width', '220px')
        .style('border', '1px solid #ccc')
        .style('border-radius', '4px')
        .style('padding', '8px 12px')
        .style('font-size', '13px')
        .style('font-family', 'inherit')
        .style('outline', 'none');

      const clearBtn = searchContainer.append('button')
        .style('display', 'none')
        .style('border', 'none')
        .style('background', 'transparent')
        .style('cursor', 'pointer')
        .style('font-size', '18px')
        .style('color', '#999')
        .style('margin-left', '8px')
        .style('padding', '0 4px')
        .text('×')
        .on('click', function() {
          searchInput.property('value', '');
          clearBtn.style('display', 'none');
          updateAllTrajectories();
        });

      function performSearch(term) {
        if (!term || term.trim() === '') {
          updateAllTrajectories();
          clearBtn.style('display', 'none');
          return;
        }

        clearBtn.style('display', 'inline');
        const lowerTerm = term.toLowerCase().trim();

        chartArea.selectAll('.city-group').each(function() {
          const g = d3.select(this);
          const city = g.datum();

          const nameMatch = city.name && city.name.toLowerCase().includes(lowerTerm);
          const countryMatch = city.country && city.country.toLowerCase().includes(lowerTerm);
          const iso3Match = city.iso3 && city.iso3.toLowerCase().includes(lowerTerm);
          const match = nameMatch || countryMatch || iso3Match;

          g.select('.trajectory-line')
            .style('stroke-opacity', match ? 0.9 : 0.03)
            .style('stroke-width', match ? 3 : 1);

          g.select('.marker-start')
            .style('opacity', match ? 1 : 0.05);

          g.select('.marker-end')
            .style('opacity', match ? 1 : 0.05);

          g.selectAll('.year-label')
            .style('opacity', match && isHighlighted(city.iso3) ? 1 : 0);

          if (match) {
            g.raise();
          }
        });
      }

      searchInput.on('input', function() {
        performSearch(this.value);
      });

      searchInput.on('focus', function() {
        d3.select(this).style('border-color', '#1E88E5');
      });

      searchInput.on('blur', function() {
        d3.select(this).style('border-color', '#ccc');
      });

      updateAllTrajectories();
    }

    createChart().catch(err => {
      console.error('Error creating chart:', err);
      document.getElementById('chart-container').innerHTML =
        '<div style="color: red; padding: 20px;">Error loading chart. Check console for details.</div>';
    });
  </script>
</body>
</html>
