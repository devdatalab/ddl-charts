<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City GDP per Capita vs PM2.5 Trajectories</title>

  <!-- Google Fonts - Lato (OWID-style) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #fafafa;
      color: #333;
    }

    .page-header {
      max-width: 1200px;
      margin: 0 auto 20px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 4px;
      color: #2c3e50;
    }

    .page-header p {
      font-size: 13px;
      color: #666;
      margin: 0;
    }

    .ddl-branding {
      padding: 0;
    }

    .ddl-branding svg {
      width: 100%;
      height: auto;
      opacity: 0.7;
    }

    .ddl-branding:hover svg {
      opacity: 1;
    }

    #chart-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 20px;
      position: relative;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 500px;
      color: #666;
    }

    .legend-controls {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
    }

    .legend-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      color: #666;
      transition: all 0.15s ease;
    }

    .legend-btn:hover {
      background: #f5f5f5;
      border-color: #ccc;
    }

    .legend-btn.active {
      background: #1E88E5;
      color: white;
      border-color: #1E88E5;
    }

    .legend-mode-toggle {
      display: flex;
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      gap: 0;
    }

    .mode-btn {
      flex: 1;
      padding: 6px 8px;
      font-size: 11px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      color: #666;
      transition: all 0.15s ease;
    }

    .mode-btn:first-child {
      border-radius: 4px 0 0 4px;
    }

    .mode-btn:last-child {
      border-radius: 0 4px 4px 0;
    }

    .mode-btn.active {
      background: #546a7b;
      color: white;
      border-color: #546a7b;
    }

    /* Tablet responsiveness */
    @media (max-width: 1024px) {
      .page-header h1 {
        font-size: 20px;
      }

      .page-header p {
        font-size: 12px;
      }

      .ddl-branding {
        display: none !important;
      }
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .page-header {
        margin-bottom: 12px;
      }

      .page-header h1 {
        font-size: 16px;
      }

      .page-header p {
        font-size: 10px;
        line-height: 1.4;
      }

      #chart-container {
        padding: 10px;
      }

      .ddl-branding {
        display: none !important;
      }

      .legend-btn {
        padding: 10px 16px;
        font-size: 14px;
      }

      .mode-btn {
        padding: 10px 14px;
        font-size: 14px;
      }

      .legend-mode-toggle {
        padding: 6px 8px;
      }

      .legend-controls {
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>City GDP per Capita vs PM2.5 Trajectories</h1>
    <p>Trajectories of top 3 cities per country (limited to population > 1M), 2013-2023. Click legend to highlight, hover over axis labels for details.</p>
  </div>

  <div id="chart-container">
    <div class="loading">Loading visualization...</div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <script type="module">
    // === REGION DEFINITIONS ===
    const REGIONS = {
      'South Asia': ['IND', 'PAK', 'BGD', 'NPL', 'LKA', 'AFG'],
      'East Asia': ['CHN', 'JPN', 'KOR', 'MNG'],
      'Southeast Asia': ['IDN', 'PHL', 'VNM', 'THA', 'MMR', 'MYS', 'SGP', 'KHM'],
      'Middle East & N. Africa': ['ARE', 'SAU', 'IRN', 'IRQ', 'EGY', 'ISR', 'JOR', 'KWT', 'QAT', 'BHR', 'LBN', 'SYR', 'DZA', 'LBY', 'MAR', 'TUN'],
      'Sub-Saharan Africa': ['NGA', 'AGO', 'BDI', 'BEN', 'BFA', 'CAF', 'CIV', 'CMR', 'COD', 'COG', 'ETH', 'GHA', 'GIN', 'GMB', 'KEN', 'LBR', 'MDG', 'MLI', 'MOZ', 'MRT', 'NER', 'RWA', 'SDN', 'SEN', 'SLE', 'SOM', 'TCD', 'TGO', 'TZA', 'UGA', 'ZAF', 'ZMB', 'ZWE'],
      'Europe': ['AUT', 'BEL', 'BGR', 'BLR', 'CZE', 'DNK', 'ESP', 'FRA', 'GRC', 'DEU', 'HUN', 'IRL', 'ITA', 'NLD', 'POL', 'PRT', 'ROU', 'RUS', 'SRB', 'SWE', 'TUR', 'UKR', 'GBR'],
      'North America': ['USA', 'CAN', 'MEX'],
      'Central America & Caribbean': ['CRI', 'GTM', 'HND', 'NIC', 'PAN', 'SLV', 'DOM', 'HTI'],
      'South America': ['ARG', 'BOL', 'BRA', 'CHL', 'COL', 'ECU', 'PER', 'PRY', 'URY'],
      'Central Asia': ['KAZ', 'UZB', 'TJK', 'KGZ', 'TKM', 'AZE', 'ARM', 'GEO'],
      'Oceania': ['AUS', 'NZL'],
    };

    // ISO3 to full country name mapping
    const ISO3_TO_NAME = {
      'AFG': 'Afghanistan', 'AGO': 'Angola', 'ARE': 'United Arab Emirates', 'ARG': 'Argentina',
      'ARM': 'Armenia', 'AUS': 'Australia', 'AUT': 'Austria', 'AZE': 'Azerbaijan',
      'BDI': 'Burundi', 'BEL': 'Belgium', 'BEN': 'Benin', 'BFA': 'Burkina Faso',
      'BGD': 'Bangladesh', 'BGR': 'Bulgaria', 'BHR': 'Bahrain', 'BLR': 'Belarus',
      'BOL': 'Bolivia', 'BRA': 'Brazil', 'CAF': 'Central African Republic', 'CAN': 'Canada',
      'CHL': 'Chile', 'CHN': 'China', 'CIV': "Côte d'Ivoire", 'CMR': 'Cameroon',
      'COD': 'DR Congo', 'COG': 'Congo', 'COL': 'Colombia', 'CRI': 'Costa Rica',
      'CZE': 'Czechia', 'DEU': 'Germany', 'DNK': 'Denmark', 'DOM': 'Dominican Republic',
      'DZA': 'Algeria', 'ECU': 'Ecuador', 'EGY': 'Egypt', 'ESP': 'Spain',
      'ETH': 'Ethiopia', 'FRA': 'France', 'GBR': 'United Kingdom', 'GEO': 'Georgia',
      'GHA': 'Ghana', 'GIN': 'Guinea', 'GMB': 'Gambia', 'GRC': 'Greece',
      'GTM': 'Guatemala', 'HND': 'Honduras', 'HTI': 'Haiti', 'HUN': 'Hungary',
      'IDN': 'Indonesia', 'IND': 'India', 'IRL': 'Ireland', 'IRN': 'Iran',
      'IRQ': 'Iraq', 'ISR': 'Israel', 'ITA': 'Italy', 'JOR': 'Jordan',
      'JPN': 'Japan', 'KAZ': 'Kazakhstan', 'KEN': 'Kenya', 'KGZ': 'Kyrgyzstan',
      'KHM': 'Cambodia', 'KOR': 'South Korea', 'KWT': 'Kuwait', 'LBN': 'Lebanon',
      'LBR': 'Liberia', 'LBY': 'Libya', 'LKA': 'Sri Lanka', 'MAR': 'Morocco',
      'MDG': 'Madagascar', 'MEX': 'Mexico', 'MLI': 'Mali', 'MMR': 'Myanmar',
      'MNG': 'Mongolia', 'MOZ': 'Mozambique', 'MRT': 'Mauritania', 'MYS': 'Malaysia',
      'NER': 'Niger', 'NGA': 'Nigeria', 'NIC': 'Nicaragua', 'NLD': 'Netherlands',
      'NPL': 'Nepal', 'NZL': 'New Zealand', 'PAK': 'Pakistan', 'PAN': 'Panama',
      'PER': 'Peru', 'PHL': 'Philippines', 'POL': 'Poland', 'PRT': 'Portugal',
      'PRY': 'Paraguay', 'QAT': 'Qatar', 'ROU': 'Romania', 'RUS': 'Russia',
      'RWA': 'Rwanda', 'SAU': 'Saudi Arabia', 'SDN': 'Sudan', 'SEN': 'Senegal',
      'SGP': 'Singapore', 'SLE': 'Sierra Leone', 'SLV': 'El Salvador', 'SOM': 'Somalia',
      'SRB': 'Serbia', 'SWE': 'Sweden', 'SYR': 'Syria', 'TCD': 'Chad',
      'TGO': 'Togo', 'THA': 'Thailand', 'TJK': 'Tajikistan', 'TKM': 'Turkmenistan',
      'TUN': 'Tunisia', 'TUR': 'Turkey', 'TZA': 'Tanzania', 'UGA': 'Uganda',
      'UKR': 'Ukraine', 'URY': 'Uruguay', 'USA': 'United States', 'UZB': 'Uzbekistan',
      'VNM': 'Vietnam', 'ZAF': 'South Africa', 'ZMB': 'Zambia', 'ZWE': 'Zimbabwe',
    };

    // Create reverse mapping: iso3 -> region
    const ISO3_TO_REGION = {};
    for (const [region, countries] of Object.entries(REGIONS)) {
      for (const iso3 of countries) {
        ISO3_TO_REGION[iso3] = region;
      }
    }

    // === COLORS ===
    const HIGHLIGHT_COLORS = [
      '#E53935', // Red
      '#1E88E5', // Blue
      '#43A047', // Green
      '#FB8C00', // Orange
      '#8E24AA', // Purple
      '#00ACC1', // Teal
      '#D81B60', // Pink
      '#FFD700', // Gold
      '#5E35B1', // Deep Purple
      '#00897B', // Dark Teal
      '#F4511E', // Deep Orange
    ];

    const DEFAULT_COUNTRY_COLORS = {
      CHN: '#E53935',
      IND: '#FFD700',
      USA: '#1E88E5',
    };

    const DEFAULT_REGION_COLORS = {
      'South Asia': '#FFD700',
      'East Asia': '#E53935',
      'North America': '#1E88E5',
    };

    const UI_COLORS = {
      text: '#5b5b5b',
      textLight: '#999999',
      muted: 'rgba(150, 150, 150, 0.5)',
      mutedMarker: 'rgba(150, 150, 150, 0.7)',
      mutedSolid: 'rgb(150, 150, 150)',  // Fully opaque version for hover
    };

    // State
    let legendMode = 'country'; // 'country' or 'region'
    let activeHighlights = new Set(['CHN', 'IND', 'USA']);
    let activeRegionHighlights = new Set(['South Asia', 'East Asia', 'North America']);
    let colorAssignments = new Map();
    let regionColorAssignments = new Map();
    let nextColorIndex = 3;
    let nextRegionColorIndex = 3;

    // Initialize default colors
    for (const [iso3, color] of Object.entries(DEFAULT_COUNTRY_COLORS)) {
      colorAssignments.set(iso3, color);
    }
    for (const [region, color] of Object.entries(DEFAULT_REGION_COLORS)) {
      regionColorAssignments.set(region, color);
    }

    function getItemColor(key) {
      if (legendMode === 'country') {
        if (activeHighlights.has(key)) {
          if (!colorAssignments.has(key)) {
            colorAssignments.set(key, HIGHLIGHT_COLORS[nextColorIndex % HIGHLIGHT_COLORS.length]);
            nextColorIndex++;
          }
          return colorAssignments.get(key);
        }
      } else {
        // Region mode - key is iso3, need to get region
        const region = ISO3_TO_REGION[key];
        if (region && activeRegionHighlights.has(region)) {
          if (!regionColorAssignments.has(region)) {
            regionColorAssignments.set(region, HIGHLIGHT_COLORS[nextRegionColorIndex % HIGHLIGHT_COLORS.length]);
            nextRegionColorIndex++;
          }
          return regionColorAssignments.get(region);
        }
      }
      return UI_COLORS.muted;
    }

    function isHighlighted(iso3) {
      if (legendMode === 'country') {
        return activeHighlights.has(iso3);
      } else {
        const region = ISO3_TO_REGION[iso3];
        return region && activeRegionHighlights.has(region);
      }
    }

    // === UTILITIES ===
    function smoothValues(values, windowSize = 3) {
      if (values.length <= 2) return [...values];
      const result = [];
      const halfWindow = Math.floor(windowSize / 2);
      for (let i = 0; i < values.length; i++) {
        if (i === 0 || i === values.length - 1) {
          result.push(values[i]);
          continue;
        }
        let sum = 0, count = 0;
        for (let j = Math.max(0, i - halfWindow); j <= Math.min(values.length - 1, i + halfWindow); j++) {
          sum += values[j];
          count++;
        }
        result.push(sum / count);
      }
      return result;
    }

    // === LOAD DATA ===
    async function loadData() {
      const response = await fetch('./data/city_trajectories.json');
      return response.json();
    }

    // === MAIN CHART ===
    async function createChart() {
      const container = d3.select('#chart-container');
      container.select('.loading').remove();

      const data = await loadData();

      // Detect mobile and touch devices using VIEWPORT dimensions
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const containerWidth = container.node().getBoundingClientRect().width;

      // Mobile: narrow width OR landscape phone (wide but very short)
      const isMobile = viewportWidth <= 600 || (viewportWidth <= 900 && viewportHeight <= 500);
      const isTablet = !isMobile && viewportWidth <= 1024;
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      // Dimensions - responsive based on screen size
      // Desktop/tablet: cap width at 1100px to prevent legend overlap
      const width = isMobile ? containerWidth - 24 : Math.min(containerWidth - 40, 1100);
      const height = isMobile ? 320 : (isTablet ? 450 : 650);  // Slightly taller on mobile
      const margin = isMobile
        ? { top: 20, right: 20, bottom: 60, left: 45 }  // More bottom margin for axis label
        : isTablet
          ? { top: 25, right: 180, bottom: 60, left: 70 }
          : { top: 30, right: 220, bottom: 70, left: 90 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      // On mobile, we'll create a wrapper for the chart area to manage layout
      // The container keeps position: relative for absolutely positioned elements
      let chartWrapper;
      if (isMobile) {
        // Create a wrapper div for the SVG that will be positioned relatively
        chartWrapper = container.append('div')
          .attr('class', 'chart-wrapper-mobile')
          .style('position', 'relative')
          .style('width', '100%');
      }

      // Create SVG - append to wrapper on mobile, container on desktop
      const svgParent = isMobile ? chartWrapper : container;
      const svg = svgParent
        .append('svg')
        .attr('width', width)
        .attr('height', height)
        .style('display', 'block');

      const chartArea = svg
        .append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      // Scales
      const xScale = d3.scaleLog()
        .domain([data.bounds.gdp.min * 0.9, data.bounds.gdp.max * 1.1])
        .range([0, innerWidth]);

      const yScale = d3.scaleLog()
        .domain([data.bounds.pm25.min * 0.9, data.bounds.pm25.max * 1.1])
        .range([innerHeight, 0]);

      // Fewer tick values on mobile/tablet for readability
      const xTickValues = isMobile
        ? [1000, 10000, 100000]
        : isTablet
          ? [1000, 5000, 20000, 100000]
          : [1000, 2000, 5000, 10000, 20000, 50000, 100000, 200000];
      const yTickValues = isMobile
        ? [10, 50, 100]
        : isTablet
          ? [10, 20, 50, 100]
          : [5, 10, 20, 50, 100, 200];
      const axisFontSize = isMobile ? '9px' : (isTablet ? '10px' : '11px');

      // Gridlines (OWID-style, rendered behind data)
      // Skip first tick value to avoid gridlines on the axes
      chartArea.append('g')
        .attr('class', 'grid x-grid')
        .selectAll('line')
        .data(xTickValues.slice(1))
        .join('line')
        .attr('x1', d => xScale(d))
        .attr('x2', d => xScale(d))
        .attr('y1', 0)
        .attr('y2', innerHeight)
        .attr('stroke', '#e0e0e0')
        .attr('stroke-dasharray', '2,2');

      chartArea.append('g')
        .attr('class', 'grid y-grid')
        .selectAll('line')
        .data(yTickValues.slice(1))
        .join('line')
        .attr('x1', 0)
        .attr('x2', innerWidth)
        .attr('y1', d => yScale(d))
        .attr('y2', d => yScale(d))
        .attr('stroke', '#e0e0e0')
        .attr('stroke-dasharray', '2,2');

      // Axes
      chartArea.append('g')
        .attr('class', 'x-axis')
        .attr('transform', `translate(0,${innerHeight})`)
        .call(d3.axisBottom(xScale)
          .tickValues(xTickValues)
          .tickFormat(d => d >= 1000 ? `$${d/1000}K` : `$${d}`)
          .tickSize(5)
        )
        .call(g => g.select('.domain').attr('stroke', '#ccc'))
        .call(g => g.selectAll('.tick line').attr('stroke', '#ccc'))
        .call(g => g.select('.tick:first-of-type line').remove())  // Remove first tick mark
        .selectAll('text')
        .style('font-size', axisFontSize)
        .style('fill', UI_COLORS.text);

      chartArea.append('g')
        .attr('class', 'y-axis')
        .call(d3.axisLeft(yScale)
          .tickValues(isMobile ? yTickValues : yTickValues.slice(1))  // Skip 5 on desktop to avoid overlap
          .tickFormat(d => d)
          .tickSize(5)
        )
        .call(g => g.select('.domain').attr('stroke', '#ccc'))
        .call(g => g.selectAll('.tick line').attr('stroke', '#ccc'))
        .selectAll('text')
        .style('font-size', axisFontSize)
        .style('fill', UI_COLORS.text);

      // Create layer groups - markers on top of lines, both on top of gridlines
      const linesLayer = chartArea.append('g').attr('class', 'lines-layer');
      const markersLayer = chartArea.append('g').attr('class', 'markers-layer');

      // X-axis label with info tooltip - position relative to chart wrapper on mobile
      const xAxisParent = isMobile ? chartWrapper : container;
      const xAxisLabel = xAxisParent.append('div')
        .style('position', 'absolute')
        .style('left', (margin.left + innerWidth / 2) + 'px')
        .style('bottom', isMobile ? '8px' : (margin.bottom - 20) + 'px')  // Fixed position on mobile to avoid tick overlap
        .style('transform', 'translateX(-50%)')
        .style('font-size', isMobile ? '10px' : (isTablet ? '11px' : '13px'))
        .style('color', UI_COLORS.text);

      xAxisLabel
        .style('cursor', 'help')
        .text('GDP per Capita ($)');

      const xTooltip = xAxisLabel.append('div')
        .style('position', 'absolute')
        .style('bottom', '20px')
        .style('left', '50%')
        .style('transform', 'translateX(-50%)')
        .style('background', 'rgba(50, 50, 50, 0.95)')
        .style('color', 'white')
        .style('padding', '10px 14px')
        .style('border-radius', '4px')
        .style('font-size', '12px')
        .style('font-weight', 'normal')
        .style('line-height', '1.5')
        .style('width', '260px')
        .style('text-align', 'left')
        .style('opacity', '0')
        .style('pointer-events', 'none')
        .style('transition', 'opacity 0.15s ease')
        .style('z-index', '1000')
        .html('<strong>GDP per Capita</strong><br>Gross Domestic Product per person, adjusted for purchasing power parity (PPP) in constant 2017 international dollars. Allows comparison across countries by accounting for price level differences.');

      xAxisLabel.on('mouseenter', () => xTooltip.style('opacity', '1'))
                .on('mouseleave', () => xTooltip.style('opacity', '0'));

      // Y-axis label with info tooltip (using SVG for proper rotation)
      const yLabelGroup = svg.append('g')
        .attr('transform', `translate(${isMobile ? 12 : (isTablet ? 18 : 50)}, ${margin.top + innerHeight / 2})`);

      const yLabelText = yLabelGroup.append('text')
        .attr('transform', 'rotate(-90)')
        .attr('text-anchor', 'middle')
        .style('font-size', isMobile ? '10px' : (isTablet ? '11px' : '13px'))
        .style('fill', UI_COLORS.text)
        .text(isMobile || isTablet ? 'PM2.5 (μg/m³)' : 'PM2.5 Pollution (μg/m³)');

      // Y-axis tooltip (HTML overlay, positioned near label) - hide on mobile
      let yTooltip;
      if (!isMobile) {
        yTooltip = container.append('div')
          .style('position', 'absolute')
          .style('left', '30px')
          .style('top', (margin.top + innerHeight / 2 - 70) + 'px')
          .style('background', 'rgba(50, 50, 50, 0.95)')
          .style('color', 'white')
          .style('padding', '10px 14px')
          .style('border-radius', '4px')
          .style('font-size', '12px')
          .style('line-height', '1.5')
          .style('width', '260px')
          .style('text-align', 'left')
          .style('opacity', '0')
          .style('pointer-events', 'none')
          .style('transition', 'opacity 0.15s ease')
          .style('z-index', '1000')
          .html('<strong>PM2.5 (Worst 3-Month Mean)</strong><br>Fine particulate matter ≤2.5 micrometers in diameter. Shows average concentration during the three most polluted months. PM2.5 penetrates deep into lungs and bloodstream. WHO guideline: &lt;5 μg/m³ annual mean.');

        // Show tooltip on hover over the entire label group (desktop only)
        yLabelGroup
          .style('cursor', 'help')
          .on('mouseenter', () => yTooltip.style('opacity', '1'))
          .on('mouseleave', () => yTooltip.style('opacity', '0'));
      }

      // Line generator
      const line = d3.line()
        .x(d => xScale(d.gdp))
        .y(d => yScale(d.pm25))
        .curve(d3.curveCardinal.tension(0.5));

      // Helper to get marker group for a city
      function getMarkerGroup(cityId) {
        return markersLayer.select(`.marker-group[data-city-id="${cityId}"]`);
      }

      // Function to update trajectories
      function updateAllTrajectories() {
        linesLayer.selectAll('.city-group').each(function() {
          const g = d3.select(this);
          const city = g.datum();
          const highlighted = isHighlighted(city.iso3);
          const color = getItemColor(city.iso3);

          g.select('.trajectory-line')
            .style('stroke', color)
            .style('stroke-width', highlighted ? 2.5 : 1.5)
            .style('stroke-opacity', highlighted ? 1 : 0.5);

          const mg = getMarkerGroup(city.id);
          mg.select('.marker-start')
            .style('fill', color)
            .attr('r', highlighted ? 4 : 3)
            .style('opacity', highlighted ? 1 : 0.6);

          mg.select('.marker-end')
            .style('stroke', color)
            .style('fill', highlighted ? 'white' : color)
            .style('opacity', highlighted ? 1 : 0.6);
        });

        // Re-sort to bring highlighted to front
        linesLayer.selectAll('.city-group')
          .sort((a, b) => {
            const aH = isHighlighted(a.iso3) ? 1 : 0;
            const bH = isHighlighted(b.iso3) ? 1 : 0;
            return aH - bH;
          });
        markersLayer.selectAll('.marker-group')
          .sort((a, b) => {
            const aH = isHighlighted(a.iso3) ? 1 : 0;
            const bH = isHighlighted(b.iso3) ? 1 : 0;
            return aH - bH;
          });
      }

      // Render all cities
      function renderCity(city) {
        const highlighted = isHighlighted(city.iso3);
        const color = getItemColor(city.iso3);

        const gdpValues = city.trajectory.map(p => p.gdp);
        const pm25Values = city.trajectory.map(p => p.pm25);
        const smoothedGdp = smoothValues(gdpValues);
        const smoothedPm25 = smoothValues(pm25Values);
        const smoothedTrajectory = city.trajectory.map((p, i) => ({
          ...p,
          gdp: smoothedGdp[i],
          pm25: smoothedPm25[i],
        }));

        // City group in lines layer (for lines and hit area)
        const cityGroup = linesLayer.append('g')
          .attr('class', 'city-group')
          .attr('data-city-id', city.id)
          .attr('data-iso3', city.iso3)
          .datum(city);

        // Invisible hit area for easier hovering (wider stroke, transparent)
        cityGroup.append('path')
          .attr('class', 'trajectory-hit-area')
          .attr('d', line(smoothedTrajectory))
          .style('fill', 'none')
          .style('stroke', 'transparent')
          .style('stroke-width', 20)
          .style('pointer-events', 'stroke');

        cityGroup.append('path')
          .attr('class', 'trajectory-line')
          .attr('d', line(smoothedTrajectory))
          .style('fill', 'none')
          .style('stroke', color)
          .style('stroke-width', highlighted ? 2.5 : 1.5)
          .style('stroke-opacity', highlighted ? 1 : 0.5)
          .style('pointer-events', 'none')  // Let hit area handle events
          .style('transition', 'stroke-width 0.15s ease, stroke-opacity 0.15s ease, stroke 0.15s ease');

        // Markers in markers layer (renders on top of all lines)
        const markerGroup = markersLayer.append('g')
          .attr('class', 'marker-group')
          .attr('data-city-id', city.id)
          .datum(city);

        const start = city.trajectory[0];
        markerGroup.append('circle')
          .attr('class', 'marker-start')
          .attr('cx', xScale(start.gdp))
          .attr('cy', yScale(start.pm25))
          .attr('r', highlighted ? 4 : 3)
          .style('fill', color)
          .style('opacity', highlighted ? 1 : 0.6)
          .style('transition', 'all 0.15s ease');

        const end = city.trajectory[city.trajectory.length - 1];
        const size = highlighted ? 5 : 4;
        const triangle = d3.symbol().type(d3.symbolTriangle).size(size * size * 2);

        markerGroup.append('path')
          .attr('class', 'marker-end')
          .attr('d', triangle)
          .attr('transform', `translate(${xScale(end.gdp)},${yScale(end.pm25)})`)
          .style('fill', highlighted ? 'white' : color)
          .style('stroke', color)
          .style('stroke-width', highlighted ? 1.5 : 1)
          .style('opacity', highlighted ? 1 : 0.6)
          .style('transition', 'all 0.15s ease');

        return cityGroup;
      }

      // Sort and render
      const sortedCities = [...data.cities].sort((a, b) => {
        const aH = isHighlighted(a.iso3) ? 1 : 0;
        const bH = isHighlighted(b.iso3) ? 1 : 0;
        return aH - bH;
      });

      sortedCities.forEach(city => renderCity(city));

      // Info box - positioned at top-left on mobile, bottom-left on desktop/tablet
      const infoBoxParent = isMobile ? chartWrapper : container;

        const gdpChange = ((city.gdpEnd - city.gdpStart) / city.gdpStart * 100).toFixed(0);
        const pm25Change = ((city.pm25End - city.pm25Start) / city.pm25Start * 100).toFixed(0);
        const gdpArrow = gdpChange >= 0 ? '↑' : '↓';
        const pm25Arrow = pm25Change >= 0 ? '↑' : '↓';
        const gdpColor = gdpChange >= 0 ? '#43A047' : '#E53935';
        const pm25Color = pm25Change <= 0 ? '#43A047' : '#E53935';

        const countryName = ISO3_TO_NAME[city.iso3] || city.country || city.iso3;
        infoBox.html(`
          <div style="font-weight: 600; font-size: 15px; margin-bottom: 2px;">${city.name}</div>
          <div style="color: #999; margin-bottom: 6px; font-size: 12px;">${countryName}</div>
          <div style="font-size: 12px; line-height: 1.5;">
            <span style="color: #999;">GDP:</span> $${Math.round(city.gdpStart).toLocaleString()} → $${Math.round(city.gdpEnd).toLocaleString()} <span style="color: ${gdpColor};">${gdpArrow}${Math.abs(gdpChange)}%</span><br>
            <span style="color: #999;">PM2.5:</span> ${city.pm25Start.toFixed(1)} → ${city.pm25End.toFixed(1)} <span style="color: ${pm25Color};">${pm25Arrow}${Math.abs(pm25Change)}%</span>
          </div>
        `);
        infoBox.style('opacity', 1);
      }

      function hideTooltip() {
        infoBox.style('opacity', 0);
      }

      linesLayer.selectAll('.city-group')
        .style('cursor', 'pointer')

          const hoveredCity = d3.select(this).datum();

          linesLayer.selectAll('.city-group').each(function() {
            const g = d3.select(this);
            const city = g.datum();
            const mg = getMarkerGroup(city.id);
            const isHoveredCity = city.id === hoveredCity.id;
            const cityIsActive = isHighlighted(city.iso3);

            // Check if city is in same group as hovered city (country or region)
            const sameGroup = legendMode === 'country'
              ? city.iso3 === hoveredCity.iso3
              : ISO3_TO_REGION[city.iso3] === ISO3_TO_REGION[hoveredCity.iso3];

            if (isHoveredCity) {
              // Hovered city: full opacity for line and markers
              // If not highlighted, switch to solid color
              if (!cityIsActive) {
                g.select('.trajectory-line')
                  .style('stroke', UI_COLORS.mutedSolid);
                mg.select('.marker-start')
                  .style('fill', UI_COLORS.mutedSolid);
                mg.select('.marker-end')
                  .style('stroke', UI_COLORS.mutedSolid);
              }
              g.select('.trajectory-line')
                .style('stroke-width', 4)
                .style('stroke-opacity', 1);
              mg.select('.marker-start')
                .style('opacity', 1);
              mg.select('.marker-end')
                .style('opacity', 1);
              g.raise();
              mg.raise();
            } else if (cityIsActive && sameGroup) {
              // Same active group as hovered - dim slightly to make hovered stand out
              g.select('.trajectory-line')
                .style('stroke-opacity', 0.35);
              mg.select('.marker-start')
                .style('opacity', 0.35);
              mg.select('.marker-end')
                .style('opacity', 0.35);
            } else if (cityIsActive) {
              // Different active group - keep full visibility
              // (do nothing - they maintain their current appearance)
            } else {
              // Dim non-active cities but keep them somewhat visible
              g.select('.trajectory-line')
                .style('stroke-opacity', 0.15);
              mg.select('.marker-start')
                .style('opacity', 0.15);
              mg.select('.marker-end')
                .style('opacity', 0.15);
            }
          });

          showTooltip(hoveredCity, event);
        })
        .on('mousemove', function(event) {
          const city = d3.select(this).datum();
          showTooltip(city, event);
        })

      // Legend Container - can fill or shrink based on content
      const legendContainer = legendWrapper.append('div')
        .style('display', 'flex')
        .style('flex-direction', 'column')
        .style('overflow', 'hidden')
        .style('background', 'white')
        .style('border-radius', '4px')
        .style('border', '1px solid #eee')
        .style('max-height', 'none');  // Let content determine height

      // Mode toggle
      const modeToggle = legendContainer.append('div')
        .attr('class', 'legend-mode-toggle');

      const countryModeBtn = modeToggle.append('button')
        .attr('class', 'mode-btn active')
        .text('Country')
        .on('click', function() {
          if (legendMode !== 'country') {
            legendMode = 'country';
            d3.select(this).classed('active', true);
            regionModeBtn.classed('active', false);
            rebuildLegend();
            updateAllTrajectories();
          }
        });

      const regionModeBtn = modeToggle.append('button')
        .attr('class', 'mode-btn')
        .text('Region')
        .on('click', function() {
          if (legendMode !== 'region') {
            legendMode = 'region';
            d3.select(this).classed('active', true);
            countryModeBtn.classed('active', false);
            rebuildLegend();
            updateAllTrajectories();
          }
        });

      // Controls container (for Deselect All button)
      const controlsContainer = legendContainer.append('div')
        .attr('class', 'legend-controls');

      const deselectAllBtn = controlsContainer.append('button')
        .attr('class', 'legend-btn')
        .text('Deselect All')
        .on('click', function() {
          if (legendMode === 'country') {
            activeHighlights.clear();
          } else {
            activeRegionHighlights.clear();
          }
          updateLegendItems();
          updateAllTrajectories();
        });

      // Marker key - shows what start/end markers mean (hidden on mobile/tablet to save space)
      if (!isMobile && !isTablet) {
        const markerKey = legendContainer.append('div')
          .style('display', 'flex')
          .style('justify-content', 'center')
          .style('align-items', 'center')
          .style('gap', '6px')
          .style('padding', '8px 12px')
          .style('border-bottom', '1px solid #eee')
          .style('font-size', '11px')
          .style('color', UI_COLORS.textLight);

        // 2013 label
        markerKey.append('span').text('2013');

        // Visual: circle —— line —— triangle
        const keySvg = markerKey.append('svg')
          .attr('width', '60')
          .attr('height', '14')
          .attr('viewBox', '0 0 60 14');

        // Start circle (solid)
        keySvg.append('circle')
          .attr('cx', '6')
          .attr('cy', '7')
          .attr('r', '4')
          .style('fill', '#666');

        // Connecting line (extends under the triangle)
        keySvg.append('line')
          .attr('x1', '10')
          .attr('y1', '7')
          .attr('x2', '54')
          .attr('y2', '7')
          .style('stroke', '#666')
          .style('stroke-width', '1.5');

        // End triangle (hollow, white fill covers line overlap)
        keySvg.append('path')
          .attr('d', 'M54,2 L59,12 L49,12 Z')
          .style('fill', 'white')
          .style('stroke', '#666')
          .style('stroke-width', '1.5');

        // 2023 label
        markerKey.append('span').text('2023');
      }

      // Legend items container - responsive layout
      const legendItemsContainer = legendContainer.append('div')
        .attr('class', 'legend-items')
        .style('flex', isMobile ? '0 1 auto' : '1')
        .style('overflow-y', isMobile ? 'visible' : 'auto')  // No vertical scroll on mobile
        .style('overflow-x', isMobile ? 'auto' : 'visible')
        .style('white-space', isMobile ? 'nowrap' : 'normal')
        .style('padding', isMobile ? '6px 4px' : '0')
        .style('-webkit-overflow-scrolling', 'touch');  // Smooth scrolling on iOS

      // Build legend items
      function rebuildLegend() {
        legendItemsContainer.selectAll('*').remove();

        if (legendMode === 'country') {
          // Country mode: full height with scroll on desktop, auto-size on mobile
          legendContainer.style('flex', isMobile ? '0 1 auto' : '1');
          legendItemsContainer.style('flex', isMobile ? '0 1 auto' : '1')
            .style('overflow-y', isMobile ? 'visible' : 'auto');
          buildCountryLegend();
        } else {
          // Region mode: shrink to fit content
          legendContainer.style('flex', '0 1 auto');
          legendItemsContainer.style('flex', '0 1 auto').style('overflow-y', 'visible');
          buildRegionLegend();
        }
      }

      function buildCountryLegend() {
        const countries = new Map();
        data.cities.forEach(city => {
          if (!countries.has(city.iso3)) {
            countries.set(city.iso3, {
              iso3: city.iso3,
              name: ISO3_TO_NAME[city.iso3] || city.country || city.iso3,
            });
          }
        });

        const sortedCountries = Array.from(countries.values()).sort((a, b) => {
          const aH = activeHighlights.has(a.iso3) ? 0 : 1;
          const bH = activeHighlights.has(b.iso3) ? 0 : 1;
          if (aH !== bH) return aH - bH;
          return a.name.localeCompare(b.name);
        });

        sortedCountries.forEach(country => {
          createLegendItem(country.iso3, country.name, 'country');
        });
      }

      function buildRegionLegend() {
        // Get regions that have cities in the data
        const regionsInData = new Set();
        data.cities.forEach(city => {
          const region = ISO3_TO_REGION[city.iso3];
          if (region) regionsInData.add(region);
        });

        const sortedRegions = Array.from(regionsInData).sort((a, b) => {
          const aH = activeRegionHighlights.has(a) ? 0 : 1;
          const bH = activeRegionHighlights.has(b) ? 0 : 1;
          if (aH !== bH) return aH - bH;
          return a.localeCompare(b);
        });

        sortedRegions.forEach(region => {
          createLegendItem(region, region, 'region');
        });
      }

      function createLegendItem(key, label, type) {
        const highlighted = type === 'country'
          ? activeHighlights.has(key)
          : activeRegionHighlights.has(key);

        let color;
        if (type === 'country') {
          color = highlighted ? (colorAssignments.get(key) || UI_COLORS.muted) : UI_COLORS.muted;
        } else {
          color = highlighted ? (regionColorAssignments.get(key) || UI_COLORS.muted) : UI_COLORS.muted;
        }

        const item = legendItemsContainer.append('div')
          .attr('class', 'legend-item')
          .attr('data-key', key)
          .attr('data-type', type)
          .style('display', isMobile ? 'inline-flex' : 'flex')
          .style('align-items', 'center')
          .style('padding', isMobile ? '8px 10px' : (isTablet ? '4px 10px' : '5px 12px'))
          .style('margin-right', isMobile ? '4px' : '0')
          .style('margin-bottom', isMobile ? '4px' : '0')
          .style('cursor', 'pointer')
          .style('border-radius', '4px')
          .style('transition', 'background-color 0.15s ease')
          .style('background', isMobile ? 'rgba(0,0,0,0.03)' : 'transparent')
          .style('border', isMobile ? '1px solid #eee' : 'none');

        item.append('div')
          .attr('class', 'legend-marker')
          .style('width', '12px')
          .style('height', '12px')
          .style('border-radius', '2px')
          .style('margin-right', '8px')
          .style('background-color', color)
          .style('opacity', highlighted ? 1 : 0.4)
          .style('flex-shrink', 0)
          .style('transition', 'all 0.15s ease');

        item.append('span')
          .attr('class', 'legend-label')
          .style('font-size', '12px')
          .style('color', highlighted ? UI_COLORS.text : UI_COLORS.textLight)
          .style('font-weight', highlighted ? '600' : '400')
          .style('white-space', 'nowrap')
          .style('overflow', 'hidden')
          .style('text-overflow', 'ellipsis')
          .style('transition', 'all 0.15s ease')
          .text(label);

        // Click to toggle
        item.on('click', function() {
          if (type === 'country') {
            if (activeHighlights.has(key)) {
              activeHighlights.delete(key);
            } else {
              activeHighlights.add(key);
              if (!colorAssignments.has(key)) {
                colorAssignments.set(key, HIGHLIGHT_COLORS[nextColorIndex % HIGHLIGHT_COLORS.length]);
                nextColorIndex++;
              }
            }
          } else {
            if (activeRegionHighlights.has(key)) {
              activeRegionHighlights.delete(key);
            } else {
              activeRegionHighlights.add(key);
              if (!regionColorAssignments.has(key)) {
                regionColorAssignments.set(key, HIGHLIGHT_COLORS[nextRegionColorIndex % HIGHLIGHT_COLORS.length]);
                nextRegionColorIndex++;
              }
            }
          }

          updateLegendItems();
          updateAllTrajectories();
        });

        // Hover - only on non-touch devices (OWID pattern)
        // Touch devices get confusing behavior when both hover and click fire
        if (!isTouchDevice) {
          item.on('mouseenter', function() {
            d3.select(this).style('background-color', 'rgba(0,0,0,0.05)');

            linesLayer.selectAll('.city-group').each(function() {
              const g = d3.select(this);
              const city = g.datum();
              const mg = getMarkerGroup(city.id);

              let isHoveredItem;
              if (type === 'country') {
                isHoveredItem = city.iso3 === key;
              } else {
                isHoveredItem = ISO3_TO_REGION[city.iso3] === key;
              }

              const cityIsActive = isHighlighted(city.iso3);

              if (isHoveredItem) {
                // If not highlighted, switch to solid color
                if (!cityIsActive) {
                  g.select('.trajectory-line')
                    .style('stroke', UI_COLORS.mutedSolid);
                  mg.select('.marker-start')
                    .style('fill', UI_COLORS.mutedSolid);
                  mg.select('.marker-end')
                    .style('stroke', UI_COLORS.mutedSolid);
                }
                g.select('.trajectory-line')
                  .style('stroke-width', 3)
                  .style('stroke-opacity', 1);
                mg.select('.marker-start')
                  .style('opacity', 1);
                mg.select('.marker-end')
                  .style('opacity', 1);
                g.raise();
                mg.raise();
              } else if (cityIsActive) {
                // Active cities are NOT affected by legend hover - keep full visibility
                // (do nothing - they maintain their current appearance)
              } else {
                // Dim non-active cities and their markers
                g.select('.trajectory-line')
                  .style('stroke-opacity', 0.15);
                mg.select('.marker-start')
                  .style('opacity', 0.15);
                mg.select('.marker-end')
                  .style('opacity', 0.15);
              }
            });
          });

          item.on('mouseleave', function() {
            d3.select(this).style('background-color', 'transparent');
            updateAllTrajectories();
          });
        }
      }

      function updateLegendItems() {
        legendItemsContainer.selectAll('.legend-item').each(function() {
          const item = d3.select(this);
          const key = item.attr('data-key');
          const type = item.attr('data-type');

          const highlighted = type === 'country'
            ? activeHighlights.has(key)
            : activeRegionHighlights.has(key);

          let color;
          if (type === 'country') {
            color = highlighted ? (colorAssignments.get(key) || UI_COLORS.muted) : UI_COLORS.muted;
          } else {
            color = highlighted ? (regionColorAssignments.get(key) || UI_COLORS.muted) : UI_COLORS.muted;
          }

          item.select('.legend-marker')
            .style('background-color', color)
            .style('opacity', highlighted ? 1 : 0.4);

          item.select('.legend-label')
            .style('font-weight', highlighted ? '600' : '400')
            .style('color', highlighted ? UI_COLORS.text : UI_COLORS.textLight);
        });
      }

      // Build initial legend
      rebuildLegend();

      // Search with dropdown - full width on mobile, smaller on tablet
      // On mobile, insert before chartWrapper; on desktop, insert before svg
      const insertSelector = isMobile ? '.chart-wrapper-mobile' : 'svg';
      const searchWrapper = container.insert('div', insertSelector)
        .style('margin-bottom', isMobile ? '8px' : '12px')
        .style('position', 'relative')
        .style('width', isMobile ? '100%' : (isTablet ? '240px' : '280px'));

      const searchContainer = searchWrapper.append('div')
        .style('display', 'flex')
        .style('align-items', 'center');

      searchContainer.append('svg')
        .attr('width', 16)
        .attr('height', 16)
        .attr('viewBox', '0 0 24 24')
        .style('margin-right', '8px')
        .style('flex-shrink', '0')
        .html(`<path fill="#999" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>`);

      const searchInput = searchContainer.append('input')
        .attr('type', 'text')
        .attr('placeholder', isMobile ? 'Search...' : 'Search cities or countries...')
        .style('width', isMobile ? '100%' : (isTablet ? '190px' : '220px'))
        .style('flex', isMobile ? '1' : 'none')
        .style('border', '1px solid #ccc')
        .style('border-radius', '4px')
        .style('padding', isMobile ? '10px 12px' : '8px 12px')
        .style('font-size', isMobile ? '16px' : (isTablet ? '12px' : '13px'))  // 16px on mobile prevents iOS zoom
        .style('font-family', 'inherit')
        .style('outline', 'none');

      const clearBtn = searchContainer.append('button')
        .style('display', 'none')
        .style('border', 'none')
        .style('background', 'transparent')
        .style('cursor', 'pointer')
        .style('font-size', '18px')
        .style('color', '#999')
        .style('margin-left', '8px')
        .style('padding', '0 4px')
        .text('×')
        .on('click', function() {
          clearSelection();
        });

      // Dropdown for search results - responsive width
      const dropdown = searchWrapper.append('div')
        .attr('class', 'search-dropdown')
        .style('position', 'absolute')
        .style('top', '100%')
        .style('left', isMobile ? '0' : '24px')
        .style('right', isMobile ? '0' : 'auto')
        .style('width', isMobile ? 'auto' : (isTablet ? '190px' : '220px'))
        .style('max-height', isMobile ? '200px' : '300px')
        .style('overflow-y', 'auto')
        .style('background', 'white')
        .style('border', '1px solid #ccc')
        .style('border-top', 'none')
        .style('border-radius', '0 0 4px 4px')
        .style('box-shadow', '0 4px 8px rgba(0,0,0,0.1)')
        .style('z-index', '100')
        .style('display', 'none');

      let selectedCity = null;
      let currentMatches = [];  // Store current dropdown matches for keyboard nav
      let highlightedIndex = -1;  // Currently highlighted dropdown item (-1 = none)

      function updateDropdownHighlight() {
        dropdown.selectAll('.dropdown-item').each(function(d, i) {
          const isHighlighted = i === highlightedIndex;
          d3.select(this).style('background', isHighlighted ? '#e3f2fd' : 'white');
          if (isHighlighted) {
            // Also highlight this city on the chart
            highlightSingleCity(currentMatches[i]);
            showTooltip(currentMatches[i]);
          }
        });
      }

      function highlightText(text, term) {
        if (!term) return text;
        const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<strong style="color: #1E88E5;">$1</strong>');
      }

      // Highlight a single city (used for dropdown hover preview)
      // Matches the same visual state as hovering directly on the chart
      function highlightSingleCity(targetCity) {
        linesLayer.selectAll('.city-group').each(function() {
          const g = d3.select(this);
          const city = g.datum();
          const mg = getMarkerGroup(city.id);
          const isTarget = city.id === targetCity.id;
          const cityIsActive = isHighlighted(city.iso3);

          if (isTarget) {
            // Target city: full opacity, thicker line
            // If not highlighted (gray), switch to solid color
            if (!cityIsActive) {
              g.select('.trajectory-line')
                .style('stroke', UI_COLORS.mutedSolid);
              mg.select('.marker-start')
                .style('fill', UI_COLORS.mutedSolid);
              mg.select('.marker-end')
                .style('stroke', UI_COLORS.mutedSolid);
            }
            g.select('.trajectory-line')
              .style('stroke-width', 4)
              .style('stroke-opacity', 1);
            mg.select('.marker-start')
              .style('opacity', 1);
            mg.select('.marker-end')
              .style('opacity', 1);
            g.raise();
            mg.raise();
          } else {
            // Dim all other cities
            g.select('.trajectory-line')
              .style('stroke-opacity', 0.1)
              .style('stroke-width', 1.5);
            mg.select('.marker-start')
              .style('opacity', 0.1);
            mg.select('.marker-end')
              .style('opacity', 0.1);
          }
        });
      }

      function selectCity(city) {
        selectedCity = city;
        searchInput.property('value', city.name);
        dropdown.style('display', 'none');
        clearBtn.style('display', 'inline');

        // Highlight only this city and show tooltip persistently
        highlightSingleCity(city);
        showTooltip(city);
      }

      function clearSelection() {
        selectedCity = null;
        searchInput.property('value', '');
        clearBtn.style('display', 'none');
        dropdown.style('display', 'none');
        updateAllTrajectories();
        hideTooltip();
      }

      function updateDropdown(term) {
        dropdown.selectAll('*').remove();
        highlightedIndex = -1;  // Reset keyboard navigation

        if (!term || term.trim().length < 1) {
          dropdown.style('display', 'none');
          currentMatches = [];
          return [];
        }

        const lowerTerm = term.toLowerCase().trim();

        // Find matching cities (search by city name, country name, or ISO3 code)
        currentMatches = data.cities.filter(city => {
          const nameMatch = city.name && city.name.toLowerCase().includes(lowerTerm);
          const fullCountryName = ISO3_TO_NAME[city.iso3] || city.country || '';
          const countryMatch = fullCountryName.toLowerCase().includes(lowerTerm);
          const iso3Match = city.iso3 && city.iso3.toLowerCase().includes(lowerTerm);
          return nameMatch || countryMatch || iso3Match;
        }).slice(0, 10); // Limit to 10 results

        if (currentMatches.length === 0) {
          dropdown.append('div')
            .style('padding', '10px 12px')
            .style('color', '#999')
            .style('font-size', '13px')
            .text('No cities found');
          dropdown.style('display', 'block');
          return [];
        }

        currentMatches.forEach((city, index) => {
          const item = dropdown.append('div')
            .attr('class', 'dropdown-item')
            .attr('data-index', index)
            .style('padding', '8px 12px')
            .style('cursor', 'pointer')
            .style('font-size', '13px')
            .style('border-bottom', '1px solid #f0f0f0')
            .style('transition', 'background 0.1s ease')
            .on('mouseenter', function() {
              highlightedIndex = index;
              updateDropdownHighlight();
            })
            .on('mouseleave', function() {
              highlightedIndex = -1;
              d3.select(this).style('background', 'white');
              // Restore search preview (all matching cities)
              const term = searchInput.property('value');
              if (term && !selectedCity) {
                performSearch(term);
              }
              if (!selectedCity) {
                hideTooltip();
              }
            })
            .on('mousedown', function(event) {
              event.preventDefault(); // Prevent blur before click registers
              selectCity(city);
            });

          item.append('div')
            .style('font-weight', '500')
            .style('color', '#333')
            .html(highlightText(city.name, term));

          const fullCountryName = ISO3_TO_NAME[city.iso3] || city.country || city.iso3;
          item.append('div')
            .style('font-size', '11px')
            .style('color', '#999')
            .style('margin-top', '2px')
            .html(highlightText(fullCountryName, term));
        });

        dropdown.style('display', 'block');
        return currentMatches;
      }

      function performSearch(term) {
        if (!term || term.trim() === '') {
          updateAllTrajectories();
          clearBtn.style('display', 'none');
          dropdown.style('display', 'none');
          selectedCity = null;
          return;
        }

        clearBtn.style('display', 'inline');
        const matches = updateDropdown(term);

        // Also highlight matching cities on the chart (preview)
        const lowerTerm = term.toLowerCase().trim();

        linesLayer.selectAll('.city-group').each(function() {
          const g = d3.select(this);
          const city = g.datum();
          const mg = getMarkerGroup(city.id);
          const color = getItemColor(city.iso3);

          const nameMatch = city.name && city.name.toLowerCase().includes(lowerTerm);
          const fullCountryName = ISO3_TO_NAME[city.iso3] || city.country || '';
          const countryMatch = fullCountryName.toLowerCase().includes(lowerTerm);
          const iso3Match = city.iso3 && city.iso3.toLowerCase().includes(lowerTerm);
          const match = nameMatch || countryMatch || iso3Match;

          // Reset colors and set opacity based on match
          g.select('.trajectory-line')
            .style('stroke', color)
            .style('stroke-opacity', match ? 0.8 : 0.15)
            .style('stroke-width', match ? 2.5 : 1.5);

          mg.select('.marker-start')
            .style('fill', color)
            .style('opacity', match ? 0.9 : 0.2);

          mg.select('.marker-end')
            .style('stroke', color)
            .style('opacity', match ? 0.9 : 0.2);

          if (match) {
            g.raise();
            mg.raise();
          }
        });
      }

      searchInput.on('input', function() {
        // Clear any persistent selection when user types
        if (selectedCity) {
          selectedCity = null;
          hideTooltip();
        }
        performSearch(this.value);
      });

      searchInput.on('focus', function() {
        d3.select(this).style('border-color', '#1E88E5');
        if (this.value && this.value.trim().length > 0) {
          updateDropdown(this.value);
        }
      });

      searchInput.on('blur', function() {
        d3.select(this).style('border-color', '#ccc');
        // Delay hiding dropdown to allow click events to register
        setTimeout(() => {
          dropdown.style('display', 'none');
        }, 150);
      });

      // Keyboard navigation
      searchInput.on('keydown', function(event) {
        const dropdownVisible = dropdown.style('display') !== 'none';

        if (event.key === 'Escape') {
          dropdown.style('display', 'none');
          highlightedIndex = -1;
          searchInput.node().blur();
        } else if (event.key === 'ArrowDown' && dropdownVisible && currentMatches.length > 0) {
          event.preventDefault();
          highlightedIndex = Math.min(highlightedIndex + 1, currentMatches.length - 1);
          updateDropdownHighlight();
        } else if (event.key === 'ArrowUp' && dropdownVisible && currentMatches.length > 0) {
          event.preventDefault();
          highlightedIndex = Math.max(highlightedIndex - 1, 0);
          updateDropdownHighlight();
        } else if (event.key === 'Enter' && dropdownVisible && highlightedIndex >= 0) {
          event.preventDefault();
          selectCity(currentMatches[highlightedIndex]);
        }
      });

      updateAllTrajectories();
    }

    // Track current dimensions for resize detection
    let currentWidth = window.innerWidth;
    let currentHeight = window.innerHeight;
    let resizeTimeout = null;

    // Initial chart creation
    createChart().catch(err => {
      console.error('Error creating chart:', err);
      document.getElementById('chart-container').innerHTML =
        '<div style="color: red; padding: 20px;">Error loading chart. Check console for details.</div>';
    });

    // Handle resize/rotation - debounced to avoid excessive redraws
    window.addEventListener('resize', () => {
      // Clear any pending resize
      if (resizeTimeout) {
        clearTimeout(resizeTimeout);
      }

      // Debounce: wait 250ms after last resize event
      resizeTimeout = setTimeout(() => {
        const newWidth = window.innerWidth;
        const newHeight = window.innerHeight;

        // Only redraw if dimensions changed significantly (>50px) or orientation changed
        const widthChanged = Math.abs(newWidth - currentWidth) > 50;
        const heightChanged = Math.abs(newHeight - currentHeight) > 50;
        const orientationChanged = (currentWidth > currentHeight) !== (newWidth > newHeight);

        if (widthChanged || heightChanged || orientationChanged) {
          currentWidth = newWidth;
          currentHeight = newHeight;

          // Clear existing chart and mobile logo
          const container = document.getElementById('chart-container');
          container.innerHTML = '<div class="loading">Resizing...</div>';

          // Remove mobile DDL logo if it exists
          const mobileLogo = document.querySelector('.ddl-branding-mobile');
          if (mobileLogo) {
            mobileLogo.remove();
          }

          // Recreate chart
          createChart().catch(err => {
            console.error('Error recreating chart:', err);
            container.innerHTML =
              '<div style="color: red; padding: 20px;">Error loading chart. Check console for details.</div>';
          });
        }
      }, 250);
    });
  </script>
</body>
</html>
